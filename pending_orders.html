<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ria - Current Orders</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f0f0; font-size: 14px; min-width: 800px; }

/* ════════════════════════════════
   TOP NAV — faithful recreation
   ════════════════════════════════ */
.top-nav {
  background: #fff;
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 clamp(12px, 1.5vw, 24px) 0 0;
  border-bottom: 3px solid #f60;
  position: sticky;
  top: 0;
  z-index: 200;
}
.nav-logo {
  display: flex;
  align-items: center;
  padding: 0 12px 0 10px;
  flex-shrink: 0;
  height: 52px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
}
.nav-link {
  font-size: 13px;
  font-weight: 700;
  color: #222;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 0 12px;
  height: 52px;
  display: flex;
  align-items: center;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -3px;
  transition: color 0.15s;
  gap: 4px;
}
.nav-link:hover { color: #f60; }
.nav-link.active { color: #f60; border-bottom-color: #f60; }

/* Hamburger button */
.ham-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 7px 8px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.ham-btn:hover { background: #fff4ec; }

/* SUB NAV ROW */
.sub-nav {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  height: 34px;
  display: flex;
  align-items: center;
  padding: 0 clamp(12px, 1.5vw, 24px);
  gap: 14px;
  position: sticky;
  top: 52px;
  z-index: 199;
}
.sub-nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.sub-user {
  font-size: 12px;
  font-weight: 700;
  color: #f60;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.sub-sep { width: 1px; height: 16px; background: #ddd; }
.sub-gear { cursor: pointer; opacity: 0.5; transition: opacity 0.15s; display:flex;align-items:center; }
.sub-gear:hover { opacity: 0.9; }
.sub-loc { font-size: 12px; color: #555; font-weight: 600; }
.sub-ref-btn {
  background: #1a3c6e;
  color: #fff;
  font-size: 11.5px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  border: none;
  font-family: Arial, sans-serif;
}
.sub-ref-btn span { color: #f7c948; }

/* Page body */
.page-body {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

/* Filter bar */
.filter-bar {
  background:#e8e8e8; border-radius:8px; padding:16px 20px; margin-bottom:16px;
  display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap;
}
.filter-group { display:flex; flex-direction:column; gap:5px; }
.filter-label { font-size:12px; font-weight:600; color:#333; }
.filter-select {
  height:32px; border:1px solid #ccc; border-radius:4px; padding:0 10px;
  font-size:13px; font-family:Arial,sans-serif; background:#fff; color:#333;
  outline:none; min-width:160px; cursor:pointer;
}
.filter-select:focus { border-color:#f60; }
.btn-list {
  height:32px; padding:0 28px; background:#f60; color:#fff; border:none;
  border-radius:4px; font-size:13px; font-weight:700; cursor:pointer;
  font-family:Arial,sans-serif; transition:background 0.15s; margin-left:auto;
  align-self:flex-end;
}
.btn-list:hover { background:#e05500; }

/* Table */
.orders-table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
.orders-table th {
  background:#e0e0e0; font-size:12px; font-weight:700; color:#333;
  text-transform:uppercase; letter-spacing:0.3px; padding:10px 12px;
  text-align:left; white-space:nowrap;
}
.orders-table td {
  padding:10px 12px; font-size:13px; color:#333; border-bottom:1px solid #f0f0f0;
  vertical-align:middle;
}
.orders-table tr:last-child td { border-bottom:none; }
.orders-table tr:hover td { background:#fafafa; }
.order-link { color:#1a4fa0; font-weight:700; text-decoration:none; }
.order-link:hover { text-decoration:underline; }
.status-incomplete {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:11.5px; font-weight:700; color:#7a1f1f; background:#fff5f5;
  border:1.5px solid #d93535; white-space:nowrap;
}
.status-pending {
  display:inline-block; padding:2px 8px; border-radius:4px;
  font-size:11.5px; font-weight:700; color:#7a5700; background:#fffbeb;
  border:1.5px solid #d4a017; white-space:nowrap;
}
.action-icon {
  background:none; border:none; cursor:pointer; padding:3px 5px;
  color:#f60; font-size:16px; transition:opacity 0.15s;
}
.action-icon:hover { opacity:0.7; }

</style>
</head>

function renderOrders() {
  var status = document.querySelectorAll('.filter-select')[0].value;
  var teller = document.querySelectorAll('.filter-select')[2].value;
  var rows = orders.filter(function(o) {
    var statusMatch = status === 'Show All' ||
      (status === 'Incomplete Order' && o.status === 'incomplete') ||
      (status === 'Pending' && o.status === 'pending') ||
      (status === 'Complete' && o.status === 'complete') ||
      (status === 'Cancelled' && o.status === 'cancelled');
    var tellerMatch = teller === 'Any Employee' || o.teller === teller;
    return statusMatch && tellerMatch;
  });

  var body = document.getElementById('ordersBody');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:#bbb;">No orders found</td></tr>';
    return;
  }
  body.innerHTML = rows.map(function(o) {
    var badge = o.status === 'incomplete'
      ? '<span class="status-incomplete">Incomplete Order</span>'
      : '<span class="status-pending">Pending</span>';
    return '<tr>' +
      '<td>' + o.br + '</td>' +
      '<td><a href="#" class="order-link">' + o.id + '</a></td>' +
      '<td>' + o.teller + '</td>' +
      '<td>' + o.customer + '</td>' +
      '<td>' + o.recipient + '</td>' +
      '<td style="text-align:right;font-weight:600;">' + o.amount + '</td>' +
      '<td>' + badge + '</td>' +
      '<td style="text-align:center;white-space:nowrap;">' +
        '<button class="action-icon" title="Edit">&#9998;</button>' +
        '<button class="action-icon" title="View">&#9998;</button>' +
        '<button class="action-icon" title="More">&#8943;</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function getFlagImg(code, size) {
  var s = size || 24;
  var h = Math.round(s * 0.67);
  var src = FLAG_IMGS[code];
  if (!src) return '<span style="font-size:11px;font-weight:700;color:#aaa;width:'+s+'px;display:inline-block;text-align:center;">'+code.slice(0,2)+'</span>';
  return '<img src="'+src+'" width="'+s+'" height="'+h+'" style="border-radius:3px;display:inline-block;vertical-align:middle;border:1px solid rgba(0,0,0,0.08);" alt="'+code+'">';
}


function renderRatesList(){
  var list=document.getElementById('ratesList');
  if(!list) return;
  if(!filteredRates.length){
    list.innerHTML='<div style="padding:16px 10px;color:#aaa;font-size:12px;text-align:center;">No countries found</div>';
    return;
  }
  list.innerHTML=filteredRates.map(function(r,i){
    var isSel=(selectedRateIdx===i);
    return'<div onclick="openRateDetail('+i+')" style="'+
      'display:flex;align-items:center;gap:6px;padding:7px 10px 7px 8px;cursor:pointer;'+
      'border-bottom:1px solid #f5f5f5;'+
      (isSel?'background:#fff3ee;':'background:#fff;')+
      'transition:background 0.1s;"'+
      ' onmouseover="if('+i+'!==selectedRateIdx)this.style.background=\'#fafafa\'" onmouseout="if('+i+'!==selectedRateIdx)this.style.background=\'#fff\'">'+
      '<span style="flex-shrink:0;width:22px;display:flex;align-items:center;">'+getFlagImg(r.code,20)+'</span>'+
      '<span style="flex:1;font-size:12px;font-weight:'+(isSel?'700':'500')+';color:'+(isSel?'#f60':'#222')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+r.country+'</span>'+
      '<span style="font-size:11.5px;font-weight:700;color:#333;margin-right:2px;">'+r.val+'</span>'+
      '<span style="font-size:9.5px;font-weight:700;color:#aaa;margin-right:3px;min-width:24px;">'+r.code+'</span>'+
      '<div style="width:20px;height:20px;border-radius:50%;background:'+(isSel?'#f60':'#f0f0f0')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+
        '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="'+(isSel?'#fff':'#999')+'" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'+
    '</div>';
  }).join('');
}

function openRateDetail(idx){
  if(selectedRateIdx===idx){
    // toggle off
    selectedRateIdx=-1;
    var _p=document.getElementById('rateDetailPane'); if(_p) _p.innerHTML='';
    renderRatesList();
    return;
  }
  selectedRateIdx=idx;
  activePayMethod=0;
  renderRatesList();
  renderDetailPane(idx);
}

function renderDetailPane(idx){
  var r=filteredRates[idx];
  var methods=['Deposit','Cash','Mobile','ATM'];
  var pane=document.getElementById('rateDetailPane');
  if(!pane) return;
  pane.innerHTML=
    // Country header bar (white with orange flag highlight)
    '<div style="padding:10px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;">'+
      '<span style="font-size:18px;">'+r.flag+'</span>'+
      '<span style="font-size:14px;font-weight:700;color:#333;">'+r.country+'</span>'+
    '</div>'+
    // Big rate display
    '<div style="padding:14px 16px 10px;text-align:center;border-bottom:1px solid #f0f0f0;">'+
      '<div style="font-size:28px;font-weight:900;color:#333;display:inline;">'+r.val+'&nbsp;</div>'+
      '<span style="font-size:16px;font-weight:700;color:#f60;display:inline;">'+r.code+'</span>'+
      '<svg viewBox="0 0 16 16" width="14" height="14" style="margin-left:2px;vertical-align:middle;"><polyline points="2 10 8 4 14 10" fill="none" stroke="#f60" stroke-width="2" stroke-linecap="round"/></svg>'+
      '<div style="font-size:10px;color:#aaa;margin-top:4px;font-style:italic;">* Best Rate. Subject to service provider availability for the selected bank.</div>'+
    '</div>'+
    // Payment method tabs
    '<div style="display:flex;gap:5px;padding:10px 14px;border-bottom:1px solid #f0f0f0;">'+
      methods.map(function(m,i){
        var act=i===activePayMethod;
        return'<button onclick="setDetailPayMethod('+i+')" style="flex:1;padding:5px 2px;font-size:11px;font-weight:700;border-radius:4px;cursor:pointer;font-family:Arial,sans-serif;'+
          (act?'background:#fff;color:#333;border:2px solid #333;':'background:#fff;color:#aaa;border:1.5px solid #ccc;')+'">'+m+'</button>';
      }).join('')+
    '</div>'+
    // Banks list
    '<div style="padding:8px 0 0;">'+
      '<div style="padding:0 14px 5px;font-size:11px;font-weight:700;color:#555;letter-spacing:0.3px;">Banks</div>'+
      '<div style="border-top:1px solid #e8e8e8;">'+
      r.banks.map(function(b){
        return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 14px;border-bottom:1px solid #f5f5f5;">'+
          '<span style="font-size:12.5px;color:#333;">'+b.n+'</span>'+
          '<span style="font-size:12.5px;font-weight:700;color:#333;">'+b.v+'&nbsp;<span style="font-size:9.5px;color:#f60;font-weight:700;">'+r.code+'</span></span>'+
        '</div>';
      }).join('')+
      '</div>'+
      '<div style="text-align:right;padding:5px 14px 8px;"><a href="#" style="font-size:11.5px;font-weight:700;color:#1a4fa0;text-decoration:none;">View All</a></div>'+
    '</div>';
}

function setDetailPayMethod(i){
  activePayMethod=i;
  renderDetailPane(selectedRateIdx);
}

// Legacy aliases
function openRateInline(idx){ openRateDetail(idx); }

function setInlinePayMethod(i){ setDetailPayMethod(i); }
function openRateModal(idx){ openRateDetail(idx); }
function closeRateModal(e){}

function filterRates(){
  var _rs=document.getElementById('ratesSearch'); if(!_rs) return;
  var q=_rs.value.toLowerCase();
  filteredRates=ratesData.filter(function(r){return !q||r.country.toLowerCase().includes(q)||r.code.toLowerCase().includes(q);});
  selectedRateIdx=-1;
  var _dp=document.getElementById('rateDetailPane'); if(_dp) _dp.innerHTML='';
  renderRatesList();
}

function renderRates(){
  filteredRates=ratesData.slice();
  renderRatesList();
  // Auto-open Mexico (index 0) to match screenshot
  openRateDetail(0);
}
if(document.getElementById('ratesList')) renderRates();


/* ── CAROUSEL ── */
var promoIdx = 0;
var promoTotal = 2;

function promoSlide(dir) {
  promoGoTo(promoIdx + dir);
}
function promoGoTo(idx) {
  var _pt=document.getElementById('promoTrack'); if(!_pt) return;
  promoIdx = ((idx % promoTotal) + promoTotal) % promoTotal;
  _pt.style.transform = 'translateX(-' + (promoIdx * 50) + '%)';
  document.querySelectorAll('.promo-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === promoIdx);
  });
}

// Auto-advance every 6 seconds
setInterval(function(){ if(document.getElementById('promoTrack')) promoSlide(1); }, 6000);

function selectRptCat(btn, panelId) {
  // update pills
  document.querySelectorAll('.rpt-pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  // show panel
  document.querySelectorAll('.rpt-panel').forEach(function(p){ p.style.display='none'; });
  document.getElementById(panelId).style.display='block';
  // update label
  /* rptActiveLabel removed */
}


function toggleWidget(bodyId, chevId){
  var body = document.getElementById(bodyId);
  var chev = document.getElementById(chevId);
  if(!body||!chev) return;
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  chev.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
}

function toggleReports(){
  var body=document.getElementById('reportsBody');
  var chev=document.getElementById('rptChevron');
  if(!body||!chev) return;
  var open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  chev.style.transform=open?'rotate(0deg)':'rotate(180deg)';
}

function toggleReportsQuick(){
  var panel=document.getElementById('reportsQuickPanel');
  var btn=document.getElementById('reportsQuickBtn');
  var isOpen=panel.classList.contains('rq-open');
  if(isOpen){
    panel.classList.remove('rq-open');
    panel.style.display='none';
    btn.style.borderColor='#e8e8e8';
    btn.style.background='#fff';
  } else {
    panel.classList.add('rq-open');
    panel.style.display='block';
    btn.style.borderColor='#f60';
    btn.style.background='#fff8f3';
    
    // Position dropdown to avoid viewport overflow
    var btnRect = btn.getBoundingClientRect();
    var panelWidth = panel.offsetWidth; // Get actual panel width
    var viewportWidth = window.innerWidth;
    
    // Calculate left position to align with the right edge of the button
    var leftPosition = btnRect.right - panelWidth;
    
    // Ensure the panel does not overflow the left edge of the viewport
    if (leftPosition < 0) {
      leftPosition = 0; // Align to the left edge of the viewport if not enough space
    }
    
    // Calculate top position to appear below the button
    var topPosition = btnRect.bottom + 6;
    
    panel.style.left = leftPosition + 'px';
    panel.style.top = topPosition + 'px';
  }
}

document.addEventListener('click', function(e){
  var panel=document.getElementById('reportsQuickPanel');
  var btn=document.getElementById('reportsQuickBtn');
  if(panel && panel.classList.contains('rq-open')){
    if(!panel.contains(e.target) && !btn.contains(e.target)){
      panel.classList.remove('rq-open');
      panel.style.display='none';
      btn.style.borderColor='#e8e8e8';
      btn.style.background='#fff';
    }
  }
});

/* Live Help Popup */
function openLiveHelpPopup() {
  closeAllDropdowns();
  var popup = document.createElement('div');
  popup.id = 'liveHelpPopup';
  popup.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
  
  popup.innerHTML = `
    <div style="position:relative;display:inline-block;max-width:35vw;max-height:calc(100vh - 40px);">
      <img src="live_help.png" alt="Live Help" style="display:block;width:100%;height:auto;object-fit:contain;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
      <button onclick="closeLiveHelpPopup()" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);border:none;color:#fff;cursor:pointer;padding:8px;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='rgba(0,0,0,0.9)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  `;
  
  document.body.appendChild(popup);
}

function closeLiveHelpPopup() {
  var popup = document.getElementById('liveHelpPopup');
  if (popup) {
    popup.remove();
  }
}




renderOrders();
