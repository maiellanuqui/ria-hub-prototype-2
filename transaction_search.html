<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ria — Agent Hub</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f0f0; font-size: 14px; min-width: 800px; }

/* ════════════════════════════════
   TOP NAV — faithful recreation
   ════════════════════════════════ */
.top-nav {
  background: #fff;
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 clamp(12px, 1.5vw, 24px) 0 0;
  border-bottom: 3px solid #f60;
  position: sticky;
  top: 0;
  z-index: 200;
}
.nav-logo {
  display: flex;
  align-items: center;
  padding: 0 12px 0 10px;
  flex-shrink: 0;
  height: 52px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
}
.nav-link {
  font-size: 13px;
  font-weight: 700;
  color: #222;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 0 12px;
  height: 52px;
  display: flex;
  align-items: center;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -3px;
  transition: color 0.15s;
  gap: 4px;
}
.nav-link:hover { color: #f60; }
.nav-link.active { color: #f60; border-bottom-color: #f60; }

/* SUB NAV ROW */
.sub-nav {
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  height: 34px;
  display: flex;
  align-items: center;
  padding: 0 clamp(12px, 1.5vw, 24px);
  gap: 14px;
  position: sticky;
  top: 52px;
  z-index: 199;
}
.sub-nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.sub-user {
  font-size: 12px;
  font-weight: 700;
  color: #f60;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.sub-sep { width: 1px; height: 16px; background: #ddd; }
.sub-gear { cursor: pointer; opacity: 0.5; transition: opacity 0.15s; display:flex;align-items:center; }
.sub-gear:hover { opacity: 0.9; }
.sub-loc { font-size: 12px; color: #555; font-weight: 600; }
.sub-ref-btn {
  background: #1a3c6e;
  color: #fff;
  font-size: 11.5px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  border: none;
  font-family: Arial, sans-serif;
}
.sub-ref-btn span { color: #f7c948; }

/* hamburger removed */

/* ════════════════════════════════
   PAGE BODY
   ════════════════════════════════ */
.body {
  padding: 16px clamp(16px, 2vw, 32px) 40px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 1600px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

@media (max-width: 1050px) { .qa-grid { grid-template-columns: repeat(3, 1fr); } }

@media (max-width: 900px) { .stats-strip { grid-template-columns: repeat(2, 1fr); } }

/* Responsive reports dropdown */
@media (max-width: 1200px) {
  #reportsQuickPanel {
    min-width: 500px !important;
  }
}

@media (max-width: 768px) {
  #reportsQuickPanel {
    min-width: 400px !important;
    max-width: 95vw !important;
  }
}

/* ── TWO-COL LAYOUT ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr clamp(280px, 28%, 420px);
  gap: 16px;
  align-items: start;
}
@media (max-width: 950px) { .two-col { grid-template-columns: 1fr; } }

/* ── CARDS ── */
.card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  border-bottom: 1px solid #f0f0f0;
  background: #fafafa;
}
.card-title {
  font-size: 13.5px;
  font-weight: 700;
  color: #222;
  display: flex;
  align-items: center;
  gap: 7px;
}
.card-meta { font-size: 11px; color: #aaa; }

/* ── FILTER BAR ── */

/* ── TRANSACTION TABLE ── */
.tx-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.tx-table th {
  background: #fafafa;
  padding: 9px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 1px solid #eee;
  white-space: nowrap;
}
.tx-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #f5f5f5;
  vertical-align: middle;
}
.tx-table tr:last-child td { border-bottom: none; }
.tx-table tbody tr:hover td { background: #fff8f3; }

/* ── RIGHT COLUMN ── */
.right-col { display: flex; flex-direction: column; gap: 14px; position: sticky; top: 16px; }

.up { color: #1a7a3c; } .dn { color: #b91c1c; }

/* ── PROMO CAROUSEL ── */
.promo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: none;
  background: #ddd;
  cursor: pointer;
  padding: 0;
  transition: all 0.2s;
}
.promo-dot.active {
  background: #f60;
  width: 20px;
  border-radius: 4px;
}

/* ── REPORT CATEGORY PILLS ── */
.rpt-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid #e0e0e0;
  background: #fff;
  font-size: 12.5px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  font-family: Arial, sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.rpt-pill:hover { border-color: #f60; color: #f60; background: #fff8f3; }
.rpt-pill.active { background: #f60; border-color: #f60; color: #fff; }
.rpt-pill.active svg { stroke: #fff; }

/* ── DROPDOWN TAB PILLS (shared by Reports + Services dropdowns) ── */
.rq-tab, .sv-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px;
  font-size: 12.5px; font-weight: 600;
  cursor: pointer; font-family: Arial, sans-serif;
  border: 1.5px solid #ddd; background: #fff; color: #555;
  transition: all 0.15s;
}
.rq-tab:hover, .sv-tab:hover { border-color: #f60; color: #f60; background: #fff8f3; }
.rq-tab.tab-active, .sv-tab.tab-active { border-color: #f60; background: #f60; color: #fff; font-weight: 700; }

/* ── REPORT PANEL LINKS ── */
.rpt-panel { padding: 10px 14px 12px; }
.rpt-links-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

/* ── WIDGET CARDS ── */
.widget-card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
}
.widget-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid #eee;
}
.widget-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.widget-title {
  font-size: 13.5px;
  font-weight: 700;
  color: #222;
}
.widget-body {
  padding: 8px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.widget-link {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: 7px;
  text-decoration: none;
  transition: background 0.12s;
  cursor: pointer;
}
.widget-link:hover { background: #f7f7f7; }
.widget-link-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.widget-link-label {
  font-size: 12.5px;
  font-weight: 600;
  color: #222;
  line-height: 1.3;
}
.widget-link:hover .widget-link-label { color: #f60; }
.widget-link-sub {
  font-size: 11px;
  color: #aaa;
  margin-top: 1px;
}
.widget-sub-group {
  font-size: 10px;
  font-weight: 700;
  color: #ccc;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  padding: 6px 8px 3px;
}

/* ── REPORT / RESOURCE GROUPS ── */
.rpt-btn-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 12.5px;
  color: #333;
  text-decoration: none;
  transition: background 0.12s, color 0.12s;
  line-height: 1.3;
  border: 1px solid transparent;
}
.rpt-btn-item svg { flex-shrink: 0; opacity: 0.45; transition: opacity 0.12s; color: #555; }
.rpt-btn-item:hover {
  background: #fff4ec;
  color: #f60;
  border-color: #fdd8b8;
}
.rpt-btn-item:hover svg { opacity: 1; color: #f60; }

/* ── REPORTS GRID ── */
.rpt-btn { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border-radius: 6px; border: 1px solid #eee; background: #fff; font-size: 12.5px; font-weight: 600; color: #333; cursor: pointer; font-family: Arial, sans-serif; transition: border-color 0.15s, color 0.15s, background 0.15s; }
.rpt-btn:hover { border-color: #f60; color: #f60; background: #fff8f3; }

/* ── SLIDE-IN DRAWER ── */
.drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.28); z-index: 499; }
.drawer-overlay.open { display: block; }
.side-drawer { display: none; position: fixed; top: 0; left: 0; bottom: 0; width: 320px; background: #fff; border-right: 1px solid #e0e0e0; z-index: 500; box-shadow: 4px 0 24px rgba(0,0,0,0.14); flex-direction: column; overflow-y: hidden; }
.side-drawer.open { display: flex; }
.drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 2px solid #f60; background: #fafafa; flex-shrink: 0; }
.drawer-title { font-size: 13px; font-weight: 700; color: #222; text-transform: uppercase; letter-spacing: 0.5px; }
.drawer-close { background: none; border: none; cursor: pointer; font-size: 20px; color: #888; padding: 2px 6px; border-radius: 4px; font-family: Arial, sans-serif; line-height: 1; }
.drawer-close:hover { background: #f0f0f0; color: #333; }
.drawer-section { padding: 10px 14px 4px; }
.drawer-section-label { font-size: 11px; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display:flex; align-items:center; gap:6px; }
.drawer-sub-label { font-size: 10px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.6px; margin: 10px 0 4px 4px; }
.drawer-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.12s; font-size: 13px; font-weight: 500; color: #444; text-decoration: none; }
.drawer-item:hover { background: #fff4ec; color: #f60; }
.drawer-sep { height: 1px; background: #f0f0f0; margin: 6px 14px; }.drawer-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; background: #f8d7da; color: #7a1f1f; }
.drawer-sep { height: 1px; background: #f0f0f0; margin: 8px 16px; }

/* ══ TRANSACTION TABS ══ */
.tx-tab {
  position: relative;
  padding: 9px 12px 10px;
  font-size: 12.5px;
  font-weight: 600;
  color: #666;
  background: #f5f5f5;
  border: 1px solid #ddd;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  font-family: Arial, sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s, background 0.15s;
  bottom: -2px;
  white-space: nowrap;
  flex-shrink: 0;
}
.tx-tab:hover { color: #f60; background: #fff; }
.tx-tab.active {
  color: #f60;
  background: #fff;
  border-color: #ddd;
  border-bottom-color: #fff;
  z-index: 1;
}
.tx-tab-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  min-width: 20px;
  height: 18px;
  padding: 0 5px;
  border-radius: 10px;
  background: #eee;
  color: #666;
}
.tx-tab.active .tx-tab-count { background: #fff3e8; color: #f60; }
</style>
</head>

var monicaLauraData = [

var searchStatusPills = {
  avail: '<span style="display:inline-block;padding:5px 14px;border-radius:4px;font-size:12px;font-weight:700;background:#e6f9ee;color:#1a7a3c;border:1.5px solid #1a7a3c;">Available For Pick Up</span>',

function performTransactionSearch() {
  var firstName = (document.getElementById('custFirstName').value || '').trim().toLowerCase();
  var lastName  = (document.getElementById('custLastName').value  || '').trim().toLowerCase();

  var results = [];

  // Check if Monica + Laura are entered (case-insensitive, any order first/last)
  var isMonicaLaura =
    (firstName === 'monica' && lastName === 'laura') ||
    (firstName === 'laura'  && lastName === 'monica');

  if (isMonicaLaura) {
    results = monicaLauraData;
  } else if (firstName || lastName) {
    // Generic search against txnData by partial customer name match
    var query = (firstName + ' ' + lastName).trim().toLowerCase();
    results = txnData
      .filter(function(r) {
        return r.c.toLowerCase().includes(firstName) &&
               (!lastName || r.c.toLowerCase().includes(lastName));
      })
      .map(function(r) {
        return { id: r.id, seq: r.seq, customer: r.c, recipient: r.r, send: r.s, receive: r.rv, st: r.st };
      });
  }

  var section = document.getElementById('searchResults');
  var body    = document.getElementById('searchResultsBody');
  var count   = document.getElementById('resultsCount');

  if (!firstName && !lastName) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  count.textContent = 'Listing 1 - ' + results.length + ' of ' + results.length + ' Records';

  if (!results.length) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:#bbb;font-size:13px;">No results found</td></tr>';
    return;
  }

  body.innerHTML = results.map(function(r) {
    var pill = searchStatusPills[r.st] || pillMap[r.st] || r.st;
    return '<tr style="border-bottom:1px solid #f0f0f0;">' +
      '<td style="padding:10px 12px;"><a href="#" style="color:#1a4fa0;font-weight:700;text-decoration:none;white-space:nowrap;">' + r.id + '</a></td>' +
      '<td style="padding:10px 12px;color:#666;">' + r.seq + '</td>' +
      '<td style="padding:10px 12px;font-weight:600;color:#222;">' + r.customer + '</td>' +
      '<td style="padding:10px 12px;color:#444;">' + r.recipient + '</td>' +
      '<td style="padding:10px 12px;text-align:right;font-weight:600;">' + r.send + '</td>' +
      '<td style="padding:10px 12px;text-align:right;font-weight:600;">' + r.receive + '</td>' +
      '<td style="padding:10px 12px;text-align:center;">' + pill + '</td>' +
      '<td style="padding:10px 12px;text-align:center;white-space:nowrap;">' + buildActionsBtn(r.id, r.st) + '</td>' +
      '</tr>';
  }).join('');
}
</script>

/* ── SHARED GRID RENDERER (used by both Reports and Services dropdowns) ── */
function renderGridItems(gridId, tab, data){
  var grid=document.getElementById(gridId);
  if(!grid) return;
  var items=data[tab]||[];
  grid.innerHTML=items.map(function(item){
    return '<a href="#" style="display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;color:#444;text-decoration:none;transition:background 0.1s,color 0.1s;font-family:Arial,sans-serif;" onmouseover="this.style.background=\'#fff8f3\';this.style.color=\'#f60\'" onmouseout="this.style.background=\'\';this.style.color=\'#444\'">'+
      '<span>'+item.label+'</span>'+
    '</a>';
  }).join('');
}

function renderReportItems(tab){
  // Reports: label only, no icons
  var grid=document.getElementById('rqItemGrid');
  if(!grid) return;
  var items=rqData[tab]||[];
  grid.innerHTML=items.map(function(item){
    var href = item.label === 'Account Statement' ? 'account_statement.html' : '#';
    var onclick = item.label === 'Account Statement' ? '' : 'onclick="return false;"';
    return '<a href="'+href+'" '+onclick+' style="display:flex;align-items:center;padding:9px 18px;font-size:13px;color:#444;text-decoration:none;transition:background 0.1s,color 0.1s;font-family:Arial,sans-serif;" onmouseover="this.style.background=\'#fff8f3\';this.style.color=\'#f60\'" onmouseout="this.style.background=\'\';this.style.color=\'#444\'">'+
      '<span>'+item.label+'</span>'+
    '</a>';
  }).join('');
}

function svRenderItems(tab){
  var grid=document.getElementById('svItemGrid');
  if(!grid) return;

  if(tab==='tools' || tab==='hd'){
    // Multi-column layout with category headers
    var cols=svData[tab];
    grid.style.cssText='display:grid;grid-template-columns:repeat('+cols.length+',1fr);gap:0;padding:0;border-top:none;';
    grid.innerHTML=cols.map(function(col, i){
      var borderRight = i < cols.length-1 ? 'border-right:1px solid #f0f0f0;' : '';
      return '<div style="'+borderRight+'padding:0;">'+
        '<div style="display:flex;align-items:center;gap:6px;padding:10px 18px 8px;border-bottom:1px solid #f0f0f0;background:#fafafa;">'+
          '<span style="color:#555;">'+col.icon+'</span>'+
          '<span style="font-size:11px;font-weight:800;color:#333;text-transform:uppercase;letter-spacing:0.5px;">'+col.heading+'</span>'+
        '</div>'+
        col.items.map(function(label){
          if (label === 'Live Help') {
            return '<a href="#" onclick="openLiveHelpPopup(); return false;" style="display:block;padding:8px 18px;font-size:13px;color:#444;text-decoration:none;transition:background 0.1s,color 0.1s;font-family:Arial,sans-serif;" onmouseover="this.style.background=\'#fff8f3\';this.style.color=\'#f60\'" onmouseout="this.style.background=\'\';this.style.color=\'#444\'">'+label+'</a>';
          } else {
            var href = label === 'Pending Orders' ? 'pending_orders.html' : '#';
            var onclick = label === 'Pending Orders' ? '' : 'onclick="return false;"';
            return '<a href="'+href+'" '+onclick+' style="display:block;padding:8px 18px;font-size:13px;color:#444;text-decoration:none;transition:background 0.1s,color 0.1s;font-family:Arial,sans-serif;" onmouseover="this.style.background=\'#fff8f3\';this.style.color=\'#f60\'" onmouseout="this.style.background=\'\';this.style.color=\'#444\'">'+label+'</a>';
          }
        }).join('')+
      '</div>';
    }).join('');
  } else {
    // Simple list layout for Account and Help & Docs
    var items=svData[tab]||[];
    var cols2 = items.length > 4 ? 2 : 1;
    grid.style.cssText='display:grid;grid-template-columns:repeat('+cols2+',1fr);gap:0;padding:8px 0 10px;';
    grid.innerHTML=items.map(function(item){
      var href = item.href || '#';
      return '<a href="'+href+'" style="display:flex;align-items:center;padding:9px 18px;font-size:13px;color:#444;text-decoration:none;transition:background 0.1s,color 0.1s;font-family:Arial,sans-serif;" onmouseover="this.style.background=\'#fff8f3\';this.style.color=\'#f60\'" onmouseout="this.style.background=\'\';this.style.color=\'#444\'">'+
        '<span>'+item.label+'</span>'+
      '</a>';
    }).join('');
  }
}

function svSetTab(tab, el){
  svActiveTab=tab;
  document.querySelectorAll('.sv-tab').forEach(function(b){ b.classList.remove('tab-active'); });
  el.classList.add('tab-active');
  svRenderItems(tab);
}

/* ── ACTIONS DROPDOWN ── */
var actionsMenuItems = {
  ch: [
    {label:'View Receipt'},
    {label:'Scan Document'},
    {label:'View Compliance Forms'},
    {label:'Submit Inquiry'},
  ],
  rf: [
    {label:'View Receipt'},
    {label:'Refund Order'},
    {label:'Submit Inquiry'},
  ],
  _default: [
    {label:'View Receipt'},
    {label:'Scan Document'},
    {label:'Submit Inquiry'},
  ]
};

function buildActionsBtn(txId, status){
  var uid = 'act-' + txId.replace(/[^a-z0-9]/gi,'');
  return '<div style="position:relative;display:inline-block;">'+
    '<button onclick="toggleActionsMenu(\''+uid+'\',\''+status+'\',event)" style="padding:5px 10px;font-size:12px;font-weight:700;border:1.5px solid #f60;border-radius:5px 0 0 5px;background:#fff;color:#f60;cursor:pointer;font-family:Arial,sans-serif;">Actions</button>'+
    '<button onclick="toggleActionsMenu(\''+uid+'\',\''+status+'\',event)" style="padding:5px 7px;font-size:12px;font-weight:700;border:1.5px solid #f60;border-left:none;border-radius:0 5px 5px 0;background:#fff;color:#f60;cursor:pointer;font-family:Arial,sans-serif;">&#8964;</button>'+
    '<div id="'+uid+'" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1.5px solid #f60;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.13);z-index:500;min-width:190px;padding:4px 0;text-align:left;">'+
    '</div>'+
  '</div>';
}

function toggleActionsMenu(uid, status, e){
  e.stopPropagation();
  var menu = document.getElementById(uid);
  if(!menu) return;
  var isOpen = menu.style.display !== 'none';
  document.querySelectorAll('[id^="act-"]').forEach(function(m){ m.style.display='none'; });
  if(!isOpen){
    var items = actionsMenuItems[status] || actionsMenuItems._default;
    menu.innerHTML = items.map(function(item){
      return '<a href="#" onclick="return false;" style="display:block;padding:8px 16px;font-size:13px;color:#333;text-decoration:none;white-space:nowrap;font-family:Arial,sans-serif;transition:background 0.1s,color 0.1s;" '+
        'onmouseover="this.style.background=\'#fff8f3\';this.style.color=\'#f60\'" '+
        'onmouseout="this.style.background=\'\';this.style.color=\'#333\'">'+
        item.label+
      '</a>';
    }).join('');
    menu.style.display = 'block';
  }
}

document.addEventListener('click', function(){
  document.querySelectorAll('[id^="act-"]').forEach(function(m){ m.style.display='none'; });
});


/* Live Help Popup */
function openLiveHelpPopup() {
  closeAllDropdowns();
  var popup = document.createElement('div');
  popup.id = 'liveHelpPopup';
  popup.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
  
  popup.innerHTML = `
    <div style="position:relative;display:inline-block;max-width:35vw;max-height:calc(100vh - 40px);">
      <img src="live_help.png" alt="Live Help" style="display:block;width:100%;height:auto;object-fit:contain;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
      <button onclick="closeLiveHelpPopup()" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);border:none;color:#fff;cursor:pointer;padding:8px;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='rgba(0,0,0,0.9)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  `;
  
  document.body.appendChild(popup);
}

function closeLiveHelpPopup() {
  var popup = document.getElementById('liveHelpPopup');
  if (popup) {
    popup.remove();
  }
}
